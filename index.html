<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CourtTrack Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#101d31; --navy2:#1a2b45; --paper:#f6f5f2; --card:#ffffff;
  --ink:#17202b; --muted:#7c8698; --line:#e7e5e0;
  --win:#1a9e72; --loss:#d9413f; --amber:#c87d1a; --maple:#d9a05b;
  --winbg:#eaf7f1; --lossbg:#fdeeee; --amberbg:#fdf5e8;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:13px;}
.disp{font-family:'Barlow Condensed',sans-serif;}

/* ── header ── */
header{background:var(--navy);color:#fff;position:sticky;top:0;z-index:50;}
.hd-inner{max-width:1100px;margin:0 auto;padding:14px 20px 0;}
.hd-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.hd-logo{font-family:'Barlow Condensed';font-weight:700;font-size:22px;letter-spacing:0.04em;text-transform:uppercase;}
.hd-logo span{color:var(--maple);}
.hd-sub{font-size:11px;color:#8fa0ba;}
.team-tabs{display:flex;gap:4px;margin-top:12px;overflow-x:auto;}
.team-tab{background:none;border:none;color:#8fa0ba;font-family:'Barlow Condensed';font-size:15px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;padding:9px 14px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
.team-tab.active{color:#fff;border-bottom-color:var(--maple);}
.view-bar{background:var(--navy2);}
.view-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;gap:2px;overflow-x:auto;}
.view-tab{background:none;border:none;color:#8fa0ba;font-size:12px;font-weight:600;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;}
.view-tab.active{color:#fff;border-bottom-color:#fff;}

main{max-width:1100px;margin:0 auto;padding:22px 20px 60px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:18px;}
.sec-h{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin:0 0 12px;}
.loading,.err{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;}
.err{color:var(--loss);}

/* ── stat tiles ── */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px;}
.tile{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
.tile .v{font-family:'Barlow Condensed';font-size:34px;font-weight:700;line-height:1;}
.tile .l{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:5px;}
.tile.win .v{color:var(--win);} .tile.loss .v{color:var(--loss);} .tile.amber .v{color:var(--amber);}

/* ── momentum strip ── */
.qstrip{display:inline-flex;gap:3px;vertical-align:middle;}
.qcell{width:30px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-size:12px;font-weight:600;color:#fff;}
.qcell.w{background:var(--win);} .qcell.l{background:var(--loss);} .qcell.d{background:#9aa4b2;} .qcell.na{background:#e3e1dc;color:#9aa4b2;}

/* ── tables ── */
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{font-size:10.5px;font-weight:600;color:var(--muted);text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em;}
th:first-child{text-align:left;}
td{padding:7px 8px;border-bottom:1px solid #f1efeb;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
td:first-child{text-align:left;font-weight:500;}
tr:last-child td{border-bottom:none;}
tbody tr.clickable{cursor:pointer;}
tbody tr.clickable:hover td{background:#faf9f6;}
tfoot td{background:#f6f5f2;font-weight:600;border-top:1px solid var(--line);}
.pos{color:var(--win);font-weight:600;} .neg{color:var(--loss);font-weight:600;}
.badge{display:inline-block;border-radius:4px;font-size:10.5px;font-weight:700;padding:2px 8px;}
.badge.w{background:var(--winbg);color:var(--win);} .badge.l{background:var(--lossbg);color:var(--loss);} .badge.d{background:#eef0f3;color:#5a6472;}
.tbl-wrap{overflow-x:auto;}

/* ── charts ── */
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;}
.chart-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
.chart-card h4{margin:0 0 8px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.legend{font-size:10px;color:var(--muted);margin-top:6px;display:flex;gap:12px;}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:-1px;}

/* ── filters ── */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
select{font-family:'Inter';font-size:12px;padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);}
label.flt{font-size:10.5px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;gap:4px;text-transform:uppercase;letter-spacing:0.04em;}

/* ── court ── */
.court-wrap{max-width:520px;}
.zone-bar{height:6px;border-radius:3px;background:#eee;overflow:hidden;width:70px;display:inline-block;vertical-align:middle;margin-right:6px;}
.zone-bar i{display:block;height:100%;}

/* ── player panel ── */
.pp-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
.pp-name{font-family:'Barlow Condensed';font-size:28px;font-weight:700;}
.pp-num{font-family:'Barlow Condensed';font-size:22px;font-weight:600;color:var(--maple);}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:14px;}
.back-btn{background:none;border:1px solid var(--line);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;color:var(--muted);margin-bottom:12px;}
.back-btn:hover{color:var(--ink);}
.gm-detail{background:#faf9f6;}
.gm-detail>td{padding:12px 10px;}
footer{max-width:1100px;margin:0 auto;padding:0 20px 30px;font-size:10.5px;color:#b6b0a6;}
@media(max-width:640px){ main{padding:16px 12px 50px;} .card{padding:14px;} .tile .v{font-size:28px;} }
</style>
</head>
<body>

<header>
  <div class="hd-inner">
    <div class="hd-top">
      <div class="hd-logo">Court<span>Track</span> Analytics</div>
      <div class="hd-sub">Season intelligence &middot; live from the event log &middot; read-only</div>
    </div>
    <div class="team-tabs" id="team-tabs"></div>
  </div>
  <div class="view-bar"><div class="view-inner" id="view-tabs"></div></div>
</header>

<main id="main"><div class="loading">Loading season data&hellip;</div></main>
<footer>CourtTrack Analytics &middot; figures computed directly from the CourtTrack event log in Supabase &middot; no OCR, no reconstruction</footer>

<script>
/* BUILD:ANALYTICS_CONFIG */
const SB_URL='https://uenxuzczcwtmiuzbnoxk.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlbnh1emN6Y3d0bWl1emJub3hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTkwMzUsImV4cCI6MjA5OTI5NTAzNX0.rsSJOZDPI7gBw6FeC7WPLwUeIZue2OD8yy8pZvz6xdY';
const TEAMS=[
  {key:'eltham_u12_girls1',aliases:[],label:'Eltham 12.1',full:'Eltham Wildcats U12 Girls 1',comp:'VC Reserve · 7-min stop clock',
   roster:{5:{num:'#5',name:'Chloe Connelley'},6:{num:'#6',name:'Lily Collett'},9:{num:'#9',name:'Indiana Sage'},11:{num:'#11',name:'Imogen Wynd'},12:{num:'#12',name:'Kiara Carlson'},14:{num:'#14',name:'Holly Bannister'},18:{num:'#18',name:'Annabelle Liu'},24:{num:'#24',name:'Olivia Oppedisano'},41:{num:'#41',name:'Samantha Neal'},43:{num:'#43',name:'Annabella Buncic'}}},
  {key:'dv_u12_girls1',aliases:[],label:'Diamond Valley',full:'Diamond Valley U12 Girls 1',comp:'VC Reserve · 7-min stop clock',
   roster:{19:{num:'#19',name:'Kaiah Black'},31:{num:'#31',name:'Scarlett Walters'},41:{num:'#41',name:'Harper Powell'},43:{num:'#43',name:'Harper Ritchie'},45:{num:'#45',name:'Mila Dixon'},53:{num:'#53',name:'Greta Morris'},55:{num:'#55',name:'Lara Shaw'},73:{num:'#73',name:'Mackenzie Haas-Baker'},75:{num:'#75',name:'Taylah Wignell'},77:{num:'#77',name:'Billie Burrell'}}},
  {key:'eltham_u12_girls2',aliases:['eltham_u12_wildcats','eltham_wildcats_u12_girls_2','eltham_wildcats_12_2_girls'],label:'Eltham 12.2',full:'Eltham Wildcats U12 Girls 2',comp:'Grading · 10-min running clock',
   roster:{4:{num:'#4',name:'Elara Jewell'},6:{num:'#6',name:'Grace Burslem'},8:{num:'#8',name:'Evie Davis'},10:{num:'#10',name:'Quinn Cukier'},13:{num:'#13',name:'Emilia Wynne'},15:{num:'#15',name:'Madeline Hadley'},21:{num:'#21',name:'Ellie Spithill'},22:{num:'#22',name:'Harper Bolton'},23:{num:'#23',name:"Zoe O'Connell"},33:{num:'#33',name:'Eva Leverton'}}}
];
/* BUILD:ANALYTICS_CONFIG_END */

const VIEWS=[{id:'overview',label:'Overview'},{id:'games',label:'Games'},{id:'players',label:'Players'},{id:'shooting',label:'Shooting'},{id:'opposition',label:'Opposition'}];
let curTeam=TEAMS[0].key, curView='overview', cache={}, selPlayer=null, expandedGame=null, expandedOppGame=null;
let shootFilters={game:'all',player:'all',q:'all',result:'all'};
let oppShootFilters={game:'all',q:'all',result:'all'};
let activeGameType='all'; // 'all' | 'vjbl' | 'domestic' | 'tournament'

/* ── zone model (ported verbatim from tracker) ── */
const ARC_CX=150,ARC_CY=17.1,ARC_R=130;
function insideArc(x,y){return Math.sqrt((x-ARC_CX)**2+(y-ARC_CY)**2)<ARC_R;}
const SC_ZONES=[
  {id:'paint',label:'Paint'},{id:'corner3l',label:'Corner 3 (L)'},{id:'corner3r',label:'Corner 3 (R)'},
  {id:'midl',label:'Mid-range (L)'},{id:'midr',label:'Mid-range (R)'},{id:'wing3l',label:'Wing 3 (L)'},
  {id:'wing3r',label:'Wing 3 (R)'},{id:'topkey',label:'Top of Key 3'},{id:'longmid',label:'Long mid-range'},{id:'other',label:'Half-court'}];
function getZone(x,y){
  if(y>155)return'other';
  if(x>=88&&x<=212&&y>=3&&y<=95)return'paint';
  if(x<28&&y<=62)return'corner3l';
  if(x>272&&y<=62)return'corner3r';
  if(!insideArc(x,y)){ if(x<88)return'wing3l'; if(x>212)return'wing3r'; return'topkey'; }
  if(x<88&&y<=95)return'midl';
  if(x>212&&y<=95)return'midr';
  if(x<88||x>212)return x<88?'midl':'midr';
  return'longmid';
}

/* ── data ── */
async function loadTeam(teamKey){
  if(cache[teamKey])return cache[teamKey];
  const t=TEAMS.find(t=>t.key===teamKey);
  const keys=[t.key,...t.aliases];
  const url=SB_URL+'/rest/v1/games?team=in.('+keys.map(k=>'"'+k+'"').join(',')+')&select=*&order=game_id.asc';
  const res=await fetch(url,{headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}});
  if(!res.ok)throw new Error('Supabase '+res.status);
  const rows=await res.json();
  const games=rows.map(r=>{try{return typeof r.data==='string'?JSON.parse(r.data):r.data;}catch(e){return null;}})
    .filter(g=>g&&g.summary&&g.summary.stats)
    .sort((a,b)=>(a.id||0)-(b.id||0));
  const data={team:t,games,names:buildNames(t,games)};
  games.forEach(g=>{g._q=quarterScores(g);g._tot=teamTotals(g,data.names);});
  cache[teamKey]=data;
  return data;
}
function buildNames(t,games){
  const m={};
  Object.keys(t.roster).forEach(id=>{m[id]={name:t.roster[id].name,num:t.roster[id].num};});
  games.forEach(g=>{
    (g.timeline||[]).forEach(ev=>{ if(ev.data&&ev.data.pid!=null&&ev.data.player&&!m[ev.data.pid])m[ev.data.pid]={name:ev.data.player,num:''}; });
    (g.shots||[]).forEach(s=>{ if(s.player_id!=null&&s.player_name&&!m[s.player_id])m[s.player_id]={name:s.player_name,num:s.player_num||''}; });
  });
  return m;
}
function pname(names,pid){return names[pid]?names[pid].name:'Player '+pid;}
function pnum(names,pid){return names[pid]?names[pid].num:'';}
function isTwoHalf(g){return g.gameType==='domestic'||g.gameType==='tournament';}
function quarterScores(g){
  if(!g.timeline||!g.timeline.length)return null;
  const per={}; g.timeline.forEach(ev=>{ if(ev.q!=null&&ev.scoreHome!=null)per[ev.q]={h:ev.scoreHome,a:ev.scoreAway}; });
  const maxPeriods=isTwoHalf(g)?2:4;
  const qs=[],maxQ=Math.max(...Object.keys(per).map(Number),1);
  let ph=0,pa=0;
  for(let q=1;q<=Math.min(maxQ,maxPeriods);q++){
    if(!per[q]){qs.push(null);continue;}
    qs.push({h:per[q].h-ph,a:per[q].a-pa,label:isTwoHalf(g)?'H'+q:'Q'+q}); ph=per[q].h; pa=per[q].a;
  }
  return qs;
}
const STAT_KEYS=['pts','fgm','fga','fgm3','fga3','ftm','fta','ast','oreb','dreb','stl','blk','tov','viol','foul'];
function teamTotals(g,names){
  const t={pts:0,fgm:0,fga:0,fgm3:0,fga3:0,ftm:0,fta:0,ast:0,oreb:0,dreb:0,stl:0,blk:0,tov:g.summary.teamTov||0,viol:0,foul:0,min:0};
  Object.keys(g.summary.stats).forEach(pid=>{
    const s=g.summary.stats[pid]||{};
    STAT_KEYS.forEach(k=>{if(k!=='tov')t[k]+=s[k]||0;});
    t.tov+=s.tov||0;
    t.min+=g.summary.minutes[pid]||0;
  });
  t.reb=t.oreb+t.dreb;
  return t;
}
function isFilmed(g){return !!(g.filmed&&g.oppSummary&&g.oppSummary.stats&&Object.keys(g.oppSummary.stats).length);}
function oppTeamTotals(g){
  if(isFilmed(g)){
    const t={pts:0,fgm:0,fga:0,fgm3:0,fga3:0,ftm:0,fta:0,ast:0,oreb:0,dreb:0,stl:0,blk:0,tov:g.oppTeamTov||0,viol:0,foul:0,min:0};
    Object.keys(g.oppSummary.stats).forEach(pid=>{
      const s=g.oppSummary.stats[pid]||{};
      STAT_KEYS.forEach(k=>{if(k!=='tov')t[k]+=s[k]||0;});
      t.tov+=s.tov||0;
      t.min+=g.oppSummary.minutes[pid]||0;
    });
    t.reb=t.oreb+t.dreb;
    return t;
  }
  const agg=g.oppAggregate||{};
  return {pts:g.scoreAway||0,tov:g.oppTeamTov||0,oreb:agg.oreb||0,dreb:agg.dreb||0,reb:(agg.oreb||0)+(agg.dreb||0),partial:true};
}
function oppShots(g){return (g.shots||[]).filter(s=>s.shotTeam==='opp');}
function timeoutCounts(g){
  let h=0,a=0;
  (g.timeline||[]).forEach(ev=>{if(ev.type==='timeout')h++;else if(ev.type==='opp_timeout')a++;});
  return {h,a};
}
function oppPname(g,pid){const p=(g.oppRoster||[]).find(p=>p.id===pid);return p?p.name:'Player '+pid;}
function oppPnum(g,pid){const p=(g.oppRoster||[]).find(p=>p.id===pid);return p&&p.num?p.num:'';}
function seasonPlayers(data){
  const agg={};
  data.games.forEach(g=>{
    Object.keys(g.summary.stats).forEach(pid=>{
      const min=g.summary.minutes[pid]||0;
      if(!agg[pid])agg[pid]={pid:+pid,gp:0,min:0,pts:0,fgm:0,fga:0,fgm3:0,fga3:0,ftm:0,fta:0,ast:0,oreb:0,dreb:0,stl:0,blk:0,tov:0,viol:0,foul:0,pm:0};
      const a=agg[pid],s=g.summary.stats[pid]||{};
      if(min>0.5)a.gp++;
      a.min+=min;
      STAT_KEYS.forEach(k=>a[k]+=s[k]||0);
      a.pm+=(g.summary.plusMinus&&g.summary.plusMinus[pid])||0;
    });
  });
  return Object.values(agg).filter(a=>a.gp>0||a.min>0.5).sort((a,b)=>b.pts-a.pts);
}
function fmtMin(m){return (Math.round(m*10)/10).toFixed(1);}
function pct(m,a){return a?Math.round(m/a*100)+'%':'—';}
function per40(v,min){return min>0.5?(v*40/min).toFixed(1):'—';}
function resBadge(g){const d=(g.scoreHome||0)-(g.scoreAway||0);return d>0?'<span class="badge w">W '+g.scoreHome+'–'+g.scoreAway+'</span>':d<0?'<span class="badge l">L '+g.scoreHome+'–'+g.scoreAway+'</span>':'<span class="badge d">D '+g.scoreHome+'–'+g.scoreAway+'</span>';}
function gLabel(g){return (g.round?'R'+g.round+' ':'')+'vs '+(g.opponent||'?');}
function gameTypeBadge(g){
  const t=g.gameType||'vjbl';
  const map={vjbl:'VJBL',domestic:'Domestic',tournament:'Tournament'};
  const col={vjbl:'#2d6fb5',domestic:'#1a9e72',tournament:'#8a5cc7'};
  const bg={vjbl:'#e8f0fb',domestic:'#eaf7f1',tournament:'#f2eaff'};
  const label=map[t]||t;const c=col[t]||'#5a6472';const b=bg[t]||'#f0f0f0';
  return '<span style="display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:'+b+';color:'+c+';">'+label+'</span>';
}
function filteredGames(games){
  if(activeGameType==='all')return games;
  return games.filter(g=>(g.gameType||'vjbl')===activeGameType);
}

/* ── momentum strip ── */
function qstrip(g){
  const qs=g._q;
  if(!qs)return'<span class="qstrip"><span class="qcell na">?</span></span>';
  return '<span class="qstrip">'+qs.map((q,i)=>{
    if(!q)return'<span class="qcell na">'+(isTwoHalf(g)?'H':'Q')+(i+1)+'</span>';
    const d=q.h-q.a,cls=d>0?'w':d<0?'l':'d',lbl=q.label||(isTwoHalf(g)?'H':'Q')+(i+1);
    return'<span class="qcell '+cls+'" title="'+lbl+': '+q.h+'–'+q.a+'">'+(d>0?'+':'')+d+'</span>';
  }).join('')+'</span>';
}

/* ── SVG chart helpers ── */
function barChart(games,fn,fn2,c1,c2,fmt){
  const W=260,H=110,P=6,n=games.length;
  if(!n)return'<div style="color:var(--muted);font-size:11px;">No games yet</div>';
  const vals=games.map(fn),vals2=fn2?games.map(fn2):[];
  const max=Math.max(...vals,...(vals2.length?vals2:[0]),1);
  const bw=Math.min(22,(W-2*P)/n/(fn2?2.4:1.4));
  let s='<svg viewBox="0 0 '+W+' '+(H+16)+'" style="width:100%;">';
  games.forEach((g,i)=>{
    const gx=P+(W-2*P)*(i+0.5)/n;
    const h1=vals[i]/max*(H-14);
    const x1=fn2?gx-bw-1:gx-bw/2;
    s+='<rect x="'+x1+'" y="'+(H-h1)+'" width="'+bw+'" height="'+h1+'" rx="2" fill="'+c1+'"><title>'+gLabel(g)+': '+(fmt?fmt(vals[i]):vals[i])+'</title></rect>';
    if(fn2){const h2=vals2[i]/max*(H-14);
      s+='<rect x="'+(gx+1)+'" y="'+(H-h2)+'" width="'+bw+'" height="'+h2+'" rx="2" fill="'+c2+'"><title>'+gLabel(g)+': '+(fmt?fmt(vals2[i]):vals2[i])+'</title></rect>';}
    s+='<text x="'+gx+'" y="'+(H+12)+'" text-anchor="middle" font-size="8" fill="#9aa4b2">R'+(g.round||i+1)+'</text>';
    s+='<text x="'+(fn2?gx-bw/2-1:gx)+'" y="'+(H-h1-3)+'" text-anchor="middle" font-size="8" font-weight="600" fill="#5a6472">'+(fmt?fmt(vals[i]):vals[i])+'</text>';
  });
  return s+'</svg>';
}

/* ── court SVG ── */
function courtSVG(shots,opts){
  opts=opts||{};
  let s='<svg viewBox="0 0 300 165" style="width:100%;display:block;border-radius:8px;background:#f3ead9;">';
  s+='<rect x="0" y="0" width="300" height="165" fill="none" stroke="#c8b089" stroke-width="1.5"/>';
  s+='<rect x="88" y="3" width="124" height="92" fill="#ecdfc6" stroke="#c8b089" stroke-width="1.5"/>';
  s+='<circle cx="150" cy="95" r="26" fill="none" stroke="#c8b089" stroke-width="1.5"/>';
  s+='<path d="M 28 3 L 28 62 A 130 130 0 0 0 272 62 L 272 3" fill="none" stroke="#c8b089" stroke-width="1.5"/>';
  s+='<line x1="0" y1="155" x2="300" y2="155" stroke="#c8b089" stroke-width="1" stroke-dasharray="4 3"/>';
  s+='<circle cx="150" cy="17" r="4.5" fill="none" stroke="#b3541e" stroke-width="1.8"/>';
  s+='<line x1="138" y1="10" x2="162" y2="10" stroke="#8a6a3d" stroke-width="2.2"/>';
  shots.forEach(sh=>{

    if(isNaN(x)||isNaN(y))return;

}
function zoneTable(shots){
  const zd={};SC_ZONES.forEach(z=>zd[z.id]={made:0,total:0,label:z.label});
  shots.forEach(s=>{const z=getZone(parseFloat(s.x),parseFloat(s.y));if(!zd[z])return;zd[z].total++;if(s.made)zd[z].made++;});
  const rows=SC_ZONES.map(z=>{
    const d=zd[z.id];if(!d.total)return'';
    const p=Math.round(d.made/d.total*100),col=p>=50?'var(--win)':p>=33?'var(--amber)':'var(--loss)';
    return'<tr><td>'+d.label+'</td><td>'+d.made+'/'+d.total+'</td><td><span class="zone-bar"><i style="width:'+p+'%;background:'+col+';"></i></span><strong style="color:'+col+';">'+p+'%</strong></td></tr>';
  }).filter(Boolean).join('');
  const tot=shots.length,tm=shots.filter(s=>s.made).length;
  if(!tot)return'<div style="color:var(--muted);font-size:11px;padding:8px 0;">No shot coordinates logged for this selection.</div>';
  const tp=Math.round(tm/tot*100);
  return'<table><thead><tr><th>Zone</th><th>FGM/FGA</th><th>FG%</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr><td>Total</td><td>'+tm+'/'+tot+'</td><td><strong>'+tp+'%</strong></td></tr></tfoot></table>';
}

    +'<div class="tile"><div class="v disp">'+(a.oreb+a.dreb)+'</div><div class="l">Rebounds</div></div>'
    +'<div class="tile"><div class="v disp">'+a.stl+' · '+a.blk+'</div><div class="l">Steals · Blocks</div></div>'
    +'<div class="tile amber"><div class="v disp">'+a.tov+'</div><div class="l">Turnovers</div></div>'
    +'<div class="tile"><div class="v disp '+(a.pm>0?'pos':a.pm<0?'neg':'')+'">'+(a.pm>0?'+':'')+a.pm+'</div><div class="l">Plus / minus</div></div>'
    +'</div>';
  h+='<div class="sec-h" style="margin-top:8px;">Per-40 rates</div><div style="font-size:12px;color:#5a6472;">Pts '+per40(a.pts,a.min)+' · Reb '+per40(a.oreb+a.dreb,a.min)+' · Ast '+per40(a.ast,a.min)+' · Stl '+per40(a.stl,a.min)+' · TOV '+per40(a.tov,a.min)+' &nbsp;<span style="color:var(--muted);">(per 40 min of court time — '+fmtMin(a.min)+' total min)</span></div></div>';
  h+='<div class="pp-grid">';
  h+='<div class="chart-card"><h4>Points by game</h4>'+barChart(d.games,g=>((g.summary.stats[pid]||{}).pts)||0,null,'#1a9e72')+'</div>';
  h+='<div class="chart-card"><h4>Minutes by game</h4>'+barChart(d.games,g=>Math.round((g.summary.minutes[pid]||0)*10)/10,null,'#5a6472')+'</div>';
  h+='<div class="chart-card"><h4>Turnovers by game</h4>'+barChart(d.games,g=>((g.summary.stats[pid]||{}).tov)||0,null,'#c87d1a')+'</div>';
  h+='</div>';
  h+='<div class="card" style="margin-top:16px;"><div class="sec-h">Game log</div><div class="tbl-wrap"><table><thead><tr><th>Game</th><th>Min</th><th>PTS</th><th>FG</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TOV</th><th>F</th><th>+/−</th></tr></thead><tbody>';
  pergame.forEach(r=>{
    h+='<tr><td>'+gLabel(r.g)+'</td><td>'+fmtMin(r.m)+'</td><td><strong>'+(r.s.pts||0)+'</strong></td><td>'+(r.s.fgm||0)+'/'+(r.s.fga||0)+'</td><td>'+((r.s.oreb||0)+(r.s.dreb||0))+'</td><td>'+(r.s.ast||0)+'</td><td>'+(r.s.stl||0)+'</td><td>'+(r.s.blk||0)+'</td><td>'+(r.s.tov||0)+'</td><td>'+(r.s.foul||0)+'</td><td>'+(r.pm==null?'—':'<span class="'+(r.pm>0?'pos':r.pm<0?'neg':'')+'">'+(r.pm>0?'+':'')+r.pm+'</span>')+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  h+='<div class="card"><div class="sec-h">Shooting — all games</div>';
  if(shots.length)h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;"><div class="court-wrap">'+courtSVG(shots)+'</div><div>'+zoneTable(shots)+'</div></div>';
  else h+='<div style="color:var(--muted);font-size:12px;">No shot coordinates logged for this player yet.</div>';
  return h+'</div>';
}

function vShooting(d){
  const f=shootFilters;
  let shots=d.games.flatMap(g=>homeShots(g).map(s=>({...s,_gid:String(g.id),_glabel:gLabel(g)})));
  if(f.game!=='all')shots=shots.filter(s=>s._gid===f.game);
  if(f.player!=='all')shots=shots.filter(s=>String(s.player_id)===f.player);
  if(f.q!=='all')shots=shots.filter(s=>String(s.period)===f.q);
  if(f.result!=='all')shots=shots.filter(s=>f.result==='made'?s.made:!s.made);
  const players=[...new Set(d.games.flatMap(g=>homeShots(g).map(s=>s.player_id)))].filter(p=>p!=null);
  let h='<div class="card"><div class="sec-h">Shot chart — aggregated across games</div><div class="filters">';
  h+='<label class="flt">Game<select onchange="shootFilters.game=this.value;render();"><option value="all"'+(f.game==='all'?' selected':'')+'>All games</option>'+d.games.map(g=>'<option value="'+g.id+'"'+(f.game===String(g.id)?' selected':'')+'>'+gLabel(g)+'</option>').join('')+'</select></label>';
  h+='<label class="flt">Player<select onchange="shootFilters.player=this.value;render();"><option value="all"'+(f.player==='all'?' selected':'')+'>All players</option>'+players.map(p=>'<option value="'+p+'"'+(f.player===String(p)?' selected':'')+'>'+pname(d.names,p)+'</option>').join('')+'</select></label>';
  h+='<label class="flt">Quarter<select onchange="shootFilters.q=this.value;render();"><option value="all"'+(f.q==='all'?' selected':'')+'>All</option>'+[1,2,3,4].map(q=>'<option value="'+q+'"'+(f.q===String(q)?' selected':'')+'>Q'+q+'</option>').join('')+'</select></label>';
  h+='<label class="flt">Result<select onchange="shootFilters.result=this.value;render();"><option value="all">All shots</option><option value="made"'+(f.result==='made'?' selected':'')+'>Made</option><option value="missed"'+(f.result==='missed'?' selected':'')+'>Missed</option></select></label>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;"><div class="court-wrap">'+courtSVG(shots)+'<div class="legend" style="margin-top:8px;"><span><i style="background:#1a9e72;border-radius:50%;"></i>Made</span><span><i style="background:#d9413f;"></i>Missed</span><span style="margin-left:auto;">'+shots.length+' attempts shown</span></div></div><div>'+zoneTable(shots)+'</div></div></div>';
  return h;
}

function oppBoxScore(d,g){
  const pids=Object.keys(g.oppSummary.stats).map(Number).filter(pid=>(g.oppSummary.minutes[pid]||0)>0.5||((g.oppSummary.stats[pid]||{}).pts||0)>0)
    .sort((a,b)=>((g.oppSummary.stats[b]||{}).pts||0)-((g.oppSummary.stats[a]||{}).pts||0));
  const to=timeoutCounts(g),ot=oppTeamTotals(g);
  let h='<div class="sec-h" style="margin-bottom:8px;">'+(g.opponent||'Opponent')+' box score — '+gLabel(g)+' <span style="text-transform:none;font-weight:400;color:var(--muted);">&middot; Timeouts: them '+to.a+', us '+to.h+'</span></div><div class="tbl-wrap"><table><thead><tr><th>Player</th><th>Min</th><th>PTS</th><th>FG</th><th>FG%</th><th>3P</th><th>FT</th><th>OREB</th><th>DREB</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TOV</th><th>VIOL</th><th>F</th></tr></thead><tbody>';
  pids.forEach(pid=>{
    const s=g.oppSummary.stats[pid]||{},m=g.oppSummary.minutes[pid]||0;
    h+='<tr><td>'+(oppPnum(g,pid)?oppPnum(g,pid)+' ':'')+oppPname(g,pid)+'</td><td>'+fmtMin(m)+'</td><td><strong>'+(s.pts||0)+'</strong></td><td>'+(s.fgm||0)+'/'+(s.fga||0)+'</td><td>'+pct(s.fgm||0,s.fga||0)+'</td><td>'+((s.fga3||0)?(s.fgm3||0)+'/'+(s.fga3||0):'—')+'</td><td>'+((s.fta||0)?(s.ftm||0)+'/'+(s.fta||0):'—')+'</td><td>'+(s.oreb||0)+'</td><td>'+(s.dreb||0)+'</td><td>'+((s.oreb||0)+(s.dreb||0))+'</td><td>'+(s.ast||0)+'</td><td>'+(s.stl||0)+'</td><td>'+(s.blk||0)+'</td><td>'+(s.tov||0)+'</td><td>'+(s.viol||0)+'</td><td>'+(s.foul||0)+'</td></tr>';
  });
  h+='</tbody><tfoot><tr><td>TEAM'+(g.oppTeamTov?' (incl '+g.oppTeamTov+' team TOV)':'')+'</td><td>—</td><td>'+ot.pts+'</td><td>'+ot.fgm+'/'+ot.fga+'</td><td>'+pct(ot.fgm,ot.fga)+'</td><td>'+(ot.fga3?ot.fgm3+'/'+ot.fga3:'—')+'</td><td>'+(ot.fta?ot.ftm+'/'+ot.fta:'—')+'</td><td>'+ot.oreb+'</td><td>'+ot.dreb+'</td><td>'+ot.reb+'</td><td>'+ot.ast+'</td><td>'+ot.stl+'</td><td>'+ot.blk+'</td><td>'+ot.tov+'</td><td>'+ot.viol+'</td><td>'+ot.foul+'</td></tr></tfoot></table></div>';
  const os=oppShots(g);
  if(os.length)h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:14px;"><div class="court-wrap">'+courtSVG(os)+'</div><div>'+zoneTable(os)+'</div></div>';
  return h;
}
function oppTeamOnlyCard(g){
  const ot=oppTeamTotals(g),to=timeoutCounts(g);
  return '<div style="font-size:12.5px;color:#5a6472;line-height:1.9;">'
    +'<strong>'+(ot.pts)+' points</strong> scored against us'
    +(ot.reb?' &middot; <strong>'+ot.reb+'</strong> rebounds against ('+ot.oreb+' off / '+ot.dreb+' def)':' &middot; rebounds against not logged')
    +' &middot; <strong>'+ot.tov+'</strong> turnovers forced'
    +' &middot; timeouts used: them '+to.a+', us '+to.h
    +'<br><span style="color:var(--muted);">No individual opponent player tracking this game — player names, shot chart and FG breakdown were not captured.</span></div>';
}
function scoutByOpponent(d){
  const byOpp={};
  d.games.forEach(g=>{
    const key=(g.opponent||'Unknown').trim();
    if(!byOpp[key])byOpp[key]={name:key,games:[]};
    byOpp[key].games.push(g);
  });
  return Object.values(byOpp).filter(o=>o.games.length>1);
}
function vOpposition(d){
  const gs=d.games;
  if(!gs.length)return'<div class="card"><div class="loading">No completed games synced yet.</div></div>';
  const repeats=scoutByOpponent(d);
  let h='';
  if(repeats.length){
    h+='<div class="card"><div class="sec-h">Repeat opponents — scouting</div><div class="tbl-wrap"><table><thead><tr><th>Opponent</th><th>Record vs them</th><th>Avg for</th><th>Avg against</th><th>Avg margin</th></tr></thead><tbody>';
    repeats.forEach(o=>{
      const w=o.games.filter(g=>g.scoreHome>g.scoreAway).length,l=o.games.filter(g=>g.scoreHome<g.scoreAway).length;
      const avgF=o.games.reduce((a,g)=>a+(g.scoreHome||0),0)/o.games.length;
      const avgA=o.games.reduce((a,g)=>a+(g.scoreAway||0),0)/o.games.length;
      h+='<tr><td>'+o.name+' <span style="color:var(--muted);font-weight:400;">('+o.games.length+' games)</span></td><td>'+w+'–'+l+'</td><td>'+avgF.toFixed(1)+'</td><td>'+avgA.toFixed(1)+'</td><td class="'+(avgF-avgA>0?'pos':'neg')+'">'+(avgF-avgA>0?'+':'')+(avgF-avgA).toFixed(1)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }
  h+='<div class="card"><div class="sec-h">Per-game opponent record — click a game for the box score</div><div class="tbl-wrap"><table><thead><tr><th>Opponent</th><th>Date</th><th>Result</th><th>Tracking</th><th>PTS against</th><th>TOV forced</th><th>REB against</th></tr></thead><tbody>';
  gs.forEach(g=>{
    const gid=String(g.id),open=expandedOppGame===gid,tracked=isFilmed(g),ot=oppTeamTotals(g);
    h+='<tr class="clickable" onclick="toggleOppGame(\''+gid+'\')"><td>'+(g.opponent||'Unknown')+'<span style="color:var(--muted);font-weight:400;"> · '+gLabel(g)+'</span></td><td style="color:var(--muted);">'+(g.date||'')+'</td><td>'+resBadge(g)+'</td><td>'+(tracked?'<span class="badge w">Player-tracked</span>':'<span class="badge d">Team totals only</span>')+'</td><td>'+ot.pts+'</td><td>'+ot.tov+'</td><td>'+(ot.reb||'—')+'</td></tr>';
    if(open)h+='<tr class="gm-detail"><td colspan="7">'+(tracked?oppBoxScore(d,g):oppTeamOnlyCard(g))+'</td></tr>';
  });
  h+='</tbody></table></div></div>';

  const f=oppShootFilters;
  const filmedGs=gs.filter(isFilmed);
  let shots=filmedGs.flatMap(g=>oppShots(g).map(s=>({...s,_gid:String(g.id)})));
  if(f.game!=='all')shots=shots.filter(s=>s._gid===f.game);
  if(f.q!=='all')shots=shots.filter(s=>String(s.period)===f.q);
  if(f.result!=='all')shots=shots.filter(s=>f.result==='made'?s.made:!s.made);
  h+='<div class="card"><div class="sec-h">Opponent shot chart — player-tracked games only ('+filmedGs.length+' of '+gs.length+')</div>';
  if(!filmedGs.length){
    h+='<div style="color:var(--muted);font-size:12px;">No games this season had individual opponent shot tracking enabled.</div></div>';
  }else{
    h+='<div class="filters">';
    h+='<label class="flt">Game<select onchange="oppShootFilters.game=this.value;render();"><option value="all"'+(f.game==='all'?' selected':'')+'>All tracked games</option>'+filmedGs.map(g=>'<option value="'+g.id+'"'+(f.game===String(g.id)?' selected':'')+'>'+gLabel(g)+' vs '+(g.opponent||'?')+'</option>').join('')+'</select></label>';
    h+='<label class="flt">Quarter<select onchange="oppShootFilters.q=this.value;render();"><option value="all"'+(f.q==='all'?' selected':'')+'>All</option>'+[1,2,3,4].map(q=>'<option value="'+q+'"'+(f.q===String(q)?' selected':'')+'>Q'+q+'</option>').join('')+'</select></label>';
    h+='<label class="flt">Result<select onchange="oppShootFilters.result=this.value;render();"><option value="all">All shots</option><option value="made"'+(f.result==='made'?' selected':'')+'>Made</option><option value="missed"'+(f.result==='missed'?' selected':'')+'>Missed</option></select></label>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;"><div class="court-wrap">'+courtSVG(shots)+'<div class="legend" style="margin-top:8px;"><span><i style="background:#1a9e72;border-radius:50%;"></i>Made</span><span><i style="background:#d9413f;"></i>Missed</span><span style="margin-left:auto;">'+shots.length+' attempts shown</span></div></div><div>'+zoneTable(shots)+'</div></div></div>';
  }
  return h;
}
function toggleOppGame(gid){expandedOppGame=expandedOppGame===gid?null:gid;render();}

/* ── shell ── */
function renderTabs(){
  document.getElementById('team-tabs').innerHTML=TEAMS.map(t=>'<button class="team-tab'+(t.key===curTeam?' active':'')+'" onclick="switchTeam(\''+t.key+'\')">'+t.label+'</button>').join('');
  document.getElementById('view-tabs').innerHTML=VIEWS.map(v=>'<button class="view-tab'+(v.id===curView?' active':'')+'" onclick="switchView(\''+v.id+'\')">'+v.label+'</button>').join('');
}
function switchTeam(k){curTeam=k;selPlayer=null;expandedGame=null;expandedOppGame=null;activeGameType='all';shootFilters={game:'all',player:'all',q:'all',result:'all'};oppShootFilters={game:'all',q:'all',result:'all'};render(true);}
function switchView(v){curView=v;render();}
async function render(reload){
  renderTabs();
  const main=document.getElementById('main');
  try{
    if(reload||!cache[curTeam])main.innerHTML='<div class="loading">Loading season data&hellip;</div>';
    const d=await loadTeam(curTeam);
    const t=d.team;
    let h='<div style="margin-bottom:14px;"><span class="disp" style="font-size:20px;font-weight:700;">'+t.full+'</span> <span style="color:var(--muted);font-size:11.5px;">&nbsp;'+t.comp+' · '+d.games.length+' game'+(d.games.length===1?'':'s')+' synced</span></div>';
    if(curView==='overview')h+=vOverview(d);
    else if(curView==='games')h+=vGames(d);
    else if(curView==='players')h+=vPlayers(d);
    else if(curView==='shooting')h+=vShooting(d);
    else h+=vOpposition(d);
    main.innerHTML=h;
  }catch(e){
    main.innerHTML='<div class="err">Could not load data: '+e.message+'<br><span style="font-size:11px;color:var(--muted);">Check the Supabase project is reachable and RLS allows anon SELECT on games.</span></div>';
  }
}
render(true);
</script>
</body>
</html>
